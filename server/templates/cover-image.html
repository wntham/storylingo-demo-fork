<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryLingo Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #E8DEFF 0%, #F8F5FF 50%, #FFE8F0 100%);
      padding: 40px;
    }
    
    .cover-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(180deg, #E8DEFF 0%, #F8F5FF 40%, #FFE8F0 100%);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    
    .sparkles {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.8) 1px, transparent 1px),
        radial-gradient(circle at 90% 15%, rgba(255,255,255,0.6) 2px, transparent 2px),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.7) 1px, transparent 1px),
        radial-gradient(circle at 85% 70%, rgba(255,255,255,0.5) 2px, transparent 2px),
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.6) 1px, transparent 1px),
        radial-gradient(circle at 70% 90%, rgba(255,255,255,0.7) 1px, transparent 1px);
      pointer-events: none;
    }
    
    .logo-container {
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, #F5F0FF 0%, #FFE8F0 100%);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(106, 90, 205, 0.2);
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    
    .logo-container img {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }
    
    .app-name {
      font-size: 56px;
      font-weight: 800;
      color: #4A3B6B;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    
    .tagline {
      font-size: 28px;
      font-weight: 600;
      color: #6B5B8C;
      margin-bottom: 48px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .features {
      display: flex;
      gap: 24px;
      position: relative;
      z-index: 1;
    }
    
    .feature {
      background: rgba(255, 255, 255, 0.8);
      padding: 16px 28px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(106, 90, 205, 0.1);
    }
    
    .feature-icon {
      font-size: 24px;
    }
    
    .feature-text {
      font-size: 18px;
      font-weight: 600;
      color: #4A3B6B;
    }
    
    .age-badge {
      position: absolute;
      top: 40px;
      right: 40px;
      background: #FF6B9D;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.3);
    }
  </style>
</head>
<body>
  <div class="cover-container">
    <div class="sparkles"></div>
    
    <div class="age-badge">Ages 3-5</div>
    
    <div class="logo-container">
      <img src="/assets/icon.png" alt="StoryLingo Owl">
    </div>
    
    <h1 class="app-name">StoryLingo</h1>
    
    <p class="tagline">Kids Learn Languages Through AI Storytelling</p>
    
    <div class="features">
      <div class="feature">
        <span class="feature-icon">🎧</span>
        <span class="feature-text">Voice Conversations</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🌍</span>
        <span class="feature-text">3 Languages</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📖</span>
        <span class="feature-text">Magical Stories</span>
      </div>
    </div>
  </div>
</body>
</html>
